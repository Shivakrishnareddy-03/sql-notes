<svg xmlns="http://www.w3.org/2000/svg" width="560" height="344" viewBox="0 0 560 344" font-family="Arial, Helvetica, sans-serif">
  <rect x="40" y="24" width="480" height="112" rx="14" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="64" y="54" font-size="16" font-weight="bold" fill="#854F0B">1 · Inner query — runs first</text>
  <text x="64" y="88" font-size="15" font-family="Menlo, Monaco, monospace" fill="#633806">SELECT AVG(salary) FROM employees</text>
  <text x="64" y="118" font-size="15" fill="#633806">&#8594; returns 84800</text>

  <line x1="280" y1="136" x2="280" y2="166" stroke="#888780" stroke-width="2"/>
  <polygon points="274,160 286,160 280,170" fill="#888780"/>

  <rect x="40" y="176" width="480" height="144" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="64" y="206" font-size="16" font-weight="bold" fill="#0F6E56">2 · Outer query — uses that value</text>
  <text x="64" y="240" font-size="15" font-family="Menlo, Monaco, monospace" fill="#085041">SELECT name, salary FROM employees</text>
  <text x="64" y="266" font-size="15" font-family="Menlo, Monaco, monospace" fill="#085041">WHERE salary &#62; 84800</text>
  <text x="64" y="298" font-size="15" fill="#085041">&#8594; Rohan, Meera, Lena</text>
</svg>
