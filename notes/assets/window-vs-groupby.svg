<svg xmlns="http://www.w3.org/2000/svg" width="560" height="360" viewBox="0 0 560 360" font-family="Arial, Helvetica, sans-serif">
  <rect x="40" y="24" width="480" height="150" rx="14" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="64" y="54" font-size="18" font-weight="bold" fill="#712B13">GROUP BY — collapses rows</text>
  <text x="64" y="76" font-size="14" fill="#993C1D">5 rows become 3 summaries (you lose the individuals)</text>
  <rect x="72" y="92" width="90" height="11" rx="3" fill="#D3D1C7"/>
  <rect x="72" y="107" width="90" height="11" rx="3" fill="#D3D1C7"/>
  <rect x="72" y="122" width="90" height="11" rx="3" fill="#D3D1C7"/>
  <rect x="72" y="137" width="90" height="11" rx="3" fill="#D3D1C7"/>
  <rect x="72" y="152" width="90" height="11" rx="3" fill="#D3D1C7"/>
  <text x="230" y="128" font-size="20" fill="#993C1D">&#8594;</text>
  <rect x="360" y="107" width="90" height="11" rx="3" fill="#F0997B"/>
  <rect x="360" y="122" width="90" height="11" rx="3" fill="#F0997B"/>
  <rect x="360" y="137" width="90" height="11" rx="3" fill="#F0997B"/>

  <rect x="40" y="190" width="480" height="150" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="64" y="220" font-size="18" font-weight="bold" fill="#085041">Window OVER() — keeps every row</text>
  <text x="64" y="242" font-size="14" fill="#0F6E56">5 rows stay 5, plus a new column</text>
  <rect x="72" y="258" width="90" height="11" rx="3" fill="#D3D1C7"/>
  <rect x="72" y="273" width="90" height="11" rx="3" fill="#D3D1C7"/>
  <rect x="72" y="288" width="90" height="11" rx="3" fill="#D3D1C7"/>
  <rect x="72" y="303" width="90" height="11" rx="3" fill="#D3D1C7"/>
  <rect x="72" y="318" width="90" height="11" rx="3" fill="#D3D1C7"/>
  <text x="230" y="294" font-size="20" fill="#0F6E56">&#8594;</text>
  <rect x="330" y="258" width="70" height="11" rx="3" fill="#D3D1C7"/>
  <rect x="330" y="273" width="70" height="11" rx="3" fill="#D3D1C7"/>
  <rect x="330" y="288" width="70" height="11" rx="3" fill="#D3D1C7"/>
  <rect x="330" y="303" width="70" height="11" rx="3" fill="#D3D1C7"/>
  <rect x="330" y="318" width="70" height="11" rx="3" fill="#D3D1C7"/>
