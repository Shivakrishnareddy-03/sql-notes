  <rect x="406" y="273" width="44" height="11" rx="3" fill="#5DCAA5"/>
  <rect x="406" y="288" width="44" height="11" rx="3" fill="#5DCAA5"/>
  <rect x="406" y="303" width="44" height="11" rx="3" fill="#5DCAA5"/>
  <rect x="406" y="318" width="44" height="11" rx="3" fill="#5DCAA5"/>
</svg>
